<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" width="900" height="1400">
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }
    </style>
  </defs>

  <!-- Main background -->
  <rect x="0" y="0" w="900" h="1400" fill="#0f0a2e" rx="20"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" w="900" h="5" fill="#6366f1"/>

  <!-- Decorative circles -->
  <circle cx="800" cy="100" r="80" fill="#6366f1" opacity="0.08"/>
  <circle cx="820" cy="100" r="40" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="40" cy="60" r="20" fill="#4338ca" opacity="0.15"/>

  <!-- Logo circle -->
  <circle cx="84" cy="59" r="24" fill="#6366f1"/>

  <!-- Logo letter R -->
  <text x="84" y="71" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle">R</text>

  <!-- Title ReadMeKit -->
  <text x="120" y="82" font-size="44" font-weight="800" fill="#ffffff" text-anchor="start">ReadMeKit</text>

  <!-- Version badge background -->
  <rect x="390" y="42" w="64" h="26" fill="#312e81" rx="13" stroke="#4338ca" stroke-width="1"/>

  <!-- Version text -->
  <text x="402" y="58" font-size="12" font-weight="600" fill="#a5b4fc" text-anchor="start">v0.1.0</text>

  <!-- Subtitle -->
  <text x="60" y="124" font-size="24" font-weight="500" fill="#a5b4fc" text-anchor="start">Visual README Component Editor</text>

  <!-- Description line 1 -->
  <text x="60" y="156" font-size="16" font-weight="400" fill="#94a3b8" text-anchor="start">Design beautiful SVG components for your GitHub README files.</text>

  <!-- Description line 2 -->
  <text x="60" y="181" font-size="16" font-weight="400" fill="#94a3b8" text-anchor="start">Drag, drop, style and export — no code needed.</text>

  <!-- CTA button 1 background -->
  <rect x="60" y="205" w="180" h="44" fill="#6366f1" rx="10"/>

  <!-- CTA button 1 text -->
  <text x="90" y="233" font-size="16" font-weight="700" fill="#ffffff" text-anchor="start">Get Started</text>

  <!-- CTA button 2 background -->
  <rect x="260" y="205" w="180" h="44" fill="transparent" rx="10" stroke="#4338ca" stroke-width="2"/>

  <!-- CTA button 2 text -->
  <text x="288" y="233" font-size="16" font-weight="600" fill="#a5b4fc" text-anchor="start">View on GitHub</text>

  <!-- Separator 1 -->
  <rect x="60" y="275" w="780" h="1" fill="#1e1b4b" opacity="0.6"/>

  <!-- FEATURES SECTION -->
  <!-- Section title -->
  <text x="60" y="328" font-size="28" font-weight="700" fill="#ffffff" text-anchor="start">Features</text>

  <!-- Accent underline -->
  <rect x="60" y="338" w="60" h="3" fill="#6366f1" rx="2"/>

  <!-- Feature Card 1: Visual Editor -->
  <rect x="60" y="365" w="250" h="160" fill="#1a1744" rx="14" stroke="#2d2a5e" stroke-width="1"/>
  <circle cx="100" cy="405" r="20" fill="#6366f1"/>
  <text x="100" y="412" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">E</text>
  <text x="80" y="460" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">Visual Editor</text>
  <text x="80" y="482" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">Drag and drop rectangles,</text>
  <text x="80" y="500" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">text, circles on a live canvas</text>

  <!-- Feature Card 2: SVG Export -->
  <rect x="330" y="365" w="250" h="160" fill="#1a1744" rx="14" stroke="#2d2a5e" stroke-width="1"/>
  <circle cx="370" cy="405" r="20" fill="#8b5cf6"/>
  <text x="370" y="412" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
  <text x="350" y="460" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">SVG Export</text>
  <text x="350" y="482" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">Export clean, GitHub-ready</text>
  <text x="350" y="500" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">SVG for any README</text>

  <!-- Feature Card 3: Templates -->
  <rect x="600" y="365" w="250" h="160" fill="#1a1744" rx="14" stroke="#2d2a5e" stroke-width="1"/>
  <circle cx="640" cy="405" r="20" fill="#a78bfa"/>
  <text x="640" y="412" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">T</text>
  <text x="620" y="460" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">Templates</text>
  <text x="620" y="482" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">Start from pre-built layouts</text>
  <text x="620" y="500" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">or create from scratch</text>

  <!-- Feature Card 4: Undo / Redo -->
  <rect x="60" y="545" w="250" h="160" fill="#1a1744" rx="14" stroke="#2d2a5e" stroke-width="1"/>
  <circle cx="100" cy="585" r="20" fill="#ec4899"/>
  <text x="100" y="592" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">U</text>
  <text x="80" y="640" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">Undo / Redo</text>
  <text x="80" y="662" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">50-state history with</text>
  <text x="80" y="680" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">Ctrl+Z / Ctrl+Shift+Z</text>

  <!-- Feature Card 5: Property Panel -->
  <rect x="330" y="545" w="250" h="160" fill="#1a1744" rx="14" stroke="#2d2a5e" stroke-width="1"/>
  <circle cx="370" cy="585" r="20" fill="#f59e0b"/>
  <text x="370" y="592" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">P</text>
  <text x="350" y="640" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">Property Panel</text>
  <text x="350" y="662" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">Position, size, color, border,</text>
  <text x="350" y="680" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">opacity controls</text>

  <!-- Feature Card 6: Layer Manager -->
  <rect x="600" y="545" w="250" h="160" fill="#1a1744" rx="14" stroke="#2d2a5e" stroke-width="1"/>
  <circle cx="640" cy="585" r="20" fill="#10b981"/>
  <text x="640" y="592" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">L</text>
  <text x="620" y="640" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">Layer Manager</text>
  <text x="620" y="662" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">Reorder, lock, hide layers</text>
  <text x="620" y="680" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start">with drag and drop</text>

  <!-- Separator 2 -->
  <rect x="60" y="730" w="780" h="1" fill="#1e1b4b" opacity="0.6"/>

  <!-- TECH STACK SECTION -->
  <!-- Section title -->
  <text x="60" y="783" font-size="28" font-weight="700" fill="#ffffff" text-anchor="start">Tech Stack</text>

  <!-- Accent underline -->
  <rect x="60" y="793" w="60" h="3" fill="#6366f1" rx="2"/>

  <!-- React badge -->
  <rect x="60" y="820" w="100" h="36" fill="#1a1744" rx="18" stroke="#3b82f6" stroke-width="1"/>
  <text x="76" y="844" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="start">React 19</text>

  <!-- TypeScript badge -->
  <rect x="175" y="820" w="120" h="36" fill="#1a1744" rx="18" stroke="#3b82f6" stroke-width="1"/>
  <text x="187" y="844" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="start">TypeScript</text>

  <!-- Vite badge -->
  <rect x="310" y="820" w="80" h="36" fill="#1a1744" rx="18" stroke="#a855f7" stroke-width="1"/>
  <text x="328" y="844" font-size="13" font-weight="600" fill="#c084fc" text-anchor="start">Vite</text>

  <!-- Tailwind badge -->
  <rect x="405" y="820" w="120" h="36" fill="#1a1744" rx="18" stroke="#06b6d4" stroke-width="1"/>
  <text x="417" y="844" font-size="13" font-weight="600" fill="#22d3ee" text-anchor="start">Tailwind 4</text>

  <!-- Zustand badge -->
  <rect x="540" y="820" w="110" h="36" fill="#1a1744" rx="18" stroke="#f59e0b" stroke-width="1"/>
  <text x="556" y="844" font-size="13" font-weight="600" fill="#fbbf24" text-anchor="start">Zustand</text>

  <!-- Immer badge -->
  <rect x="665" y="820" w="90" h="36" fill="#1a1744" rx="18" stroke="#10b981" stroke-width="1"/>
  <text x="681" y="844" font-size="13" font-weight="600" fill="#34d399" text-anchor="start">Immer</text>

  <!-- Zundo badge -->
  <rect x="770" y="820" w="90" h="36" fill="#1a1744" rx="18" stroke="#f43f5e" stroke-width="1"/>
  <text x="784" y="844" font-size="13" font-weight="600" fill="#fb7185" text-anchor="start">Zundo</text>

  <!-- Separator 3 -->
  <rect x="60" y="885" w="780" h="1" fill="#1e1b4b" opacity="0.6"/>

  <!-- HOW IT WORKS SECTION -->
  <!-- Section title -->
  <text x="60" y="938" font-size="28" font-weight="700" fill="#ffffff" text-anchor="start">How It Works</text>

  <!-- Accent underline -->
  <rect x="60" y="948" w="60" h="3" fill="#6366f1" rx="2"/>

  <!-- Step 1 -->
  <circle cx="85" cy="1000" r="25" fill="#6366f1"/>
  <text x="85" y="1008" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
  <text x="155" y="1003" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">Create &amp; Design</text>
  <text x="155" y="1025" font-size="13" font-weight="400" fill="#94a3b8" text-anchor="start">Add shapes, text and colors to your canvas</text>

  <!-- Connector 1 -->
  <rect x="82" y="1030" w="2" h="20" fill="#4338ca" opacity="0.5"/>

  <!-- Step 2 -->
  <circle cx="85" cy="1080" r="25" fill="#8b5cf6"/>
  <text x="85" y="1088" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">2</text>
  <text x="155" y="1083" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">Style &amp; Position</text>
  <text x="155" y="1105" font-size="13" font-weight="400" fill="#94a3b8" text-anchor="start">Use the property panel to fine-tune everything</text>

  <!-- Connector 2 -->
  <rect x="82" y="1110" w="2" h="20" fill="#4338ca" opacity="0.5"/>

  <!-- Step 3 -->
  <circle cx="85" cy="1160" r="25" fill="#a78bfa"/>
  <text x="85" y="1168" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
  <text x="155" y="1163" font-size="18" font-weight="700" fill="#e0e7ff" text-anchor="start">Export SVG</text>
  <text x="155" y="1185" font-size="13" font-weight="400" fill="#94a3b8" text-anchor="start">One-click export for your GitHub README</text>

  <!-- Separator 4 -->
  <rect x="60" y="1215" w="780" h="1" fill="#1e1b4b" opacity="0.6"/>

  <!-- FOOTER -->
  <!-- Footer background -->
  <rect x="0" y="1235" w="900" h="165" fill="#0a0620"/>

  <!-- Badge background -->
  <rect x="290" y="1260" w="320" h="48" fill="#1a1744" rx="24" stroke="#2d2a5e" stroke-width="1"/>

  <!-- Badge text -->
  <text x="450" y="1292" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Made with ReadMeKit</text>

  <!-- GitHub link -->
  <text x="60" y="1350" font-size="13" font-weight="400" fill="#6366f1" text-anchor="start">github.com/diurn/readmekit</text>

  <!-- Email -->
  <text x="840" y="1350" font-size="13" font-weight="400" fill="#6366f1" text-anchor="end">diurn.design@gmail.com</text>

  <!-- Copyright -->
  <text x="450" y="1380" font-size="12" font-weight="400" fill="#4b5563" text-anchor="middle">2025 ReadMeKit — MIT License</text>

  <!-- Decorative circles footer -->
  <circle cx="850" cy="1280" r="30" fill="#6366f1" opacity="0.06"/>
  <circle cx="40" cy="1300" r="20" fill="#8b5cf6" opacity="0.08"/>

</svg>
